<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHCP Analyzer — 登入</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.1);
  }
  .login-header {
    background: #0d6efd;
    border-radius: 12px 12px 0 0;
    padding: 2rem;
    text-align: center;
    color: #fff;
  }
  .login-header h5 { margin: 0; font-weight: 700; font-size: 1.25rem; }
  .login-header p  { margin: .25rem 0 0; opacity: .85; font-size: .9rem; }
</style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <h5>DHCP Analyzer</h5>
    <p>請登入以繼續</p>
  </div>
  <div class="card-body p-4">
    <div id="error-msg" class="alert alert-danger d-none" role="alert">帳號或密碼錯誤</div>
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">帳號</label>
        <input type="text" class="form-control" name="username" autofocus autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">密碼</label>
        <input type="password" class="form-control" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">登入</button>
    </form>
  </div>
</div>

<script>
  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('error-msg').classList.remove('d-none');
  }
</script>
</body>
</html>
